name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Publish npm package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm for trusted publishing
        run: npm install --global npm@latest

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Verify release version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $package_version"
            exit 1
          fi

          if npm view "miko-code@$package_version" version >/dev/null 2>&1; then
            echo "::error::miko-code@$package_version is already published"
            exit 1
          fi

      - name: Lint
        run: bun run lint

      - name: Typecheck and build
        run: bun run check

      - name: Test
        run: bun run test

      - name: Pack and smoke-test CLI
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tarball="$GITHUB_WORKSPACE/miko-code-$package_version.tgz"
          test_home="$RUNNER_TEMP/miko-release-smoke"

          npm pack --silent
          mkdir -p "$test_home"
          export HOME="$test_home"
          export BUN_INSTALL="$test_home/.bun"
          export PATH="$BUN_INSTALL/bin:$PATH"

          bun install --global "$tarball"
          miko --version | grep --fixed-strings "$package_version"

      - name: Publish to npm
        run: |
          package_version="$(node -p "require('./package.json').version")"
          npm publish "miko-code-$package_version.tgz" --access public --provenance

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
