name: CI                                                                                                 
  on:                                                                                             
    push:
      branches: [main]                                                                              
    pull_request:
      branches: [main]                                                                              
                                                                                                  
  jobs:
    ci:
      name: Format, Lint, Build & Test
      runs-on: ubuntu-latest                                                                        
      steps:
        - uses: actions/checkout@v4                                                                 
                                                                                                  
        - uses: oven-sh/setup-bun@v2

        - run: bun install

        - name: Format check                                                                        
          run: bunx biome format --check ./src
                                                                                                    
        - name: Lint                                                                              
          run: bunx biome check ./src

        - name: Typecheck & Build
          run: bun run check

        - name: Test                                                                                
          run: bun test